<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html,body {
            height: 100%;
            width: 100%;
        }

        body {
            background-color: black;
            display: flex;
            align-items: centre;
            justify-content: center;
        }

        @property --rotate {
            syntax: "<angle>";
                initial-value: 0deg;
                inherits: false;
        }

        @keyframes borderanimate {
            from {
                --rotate:0deg;
            }
            
            to {
                --rotate:360deg;
            }
        }
        
        .box {
            max-width: 300px;
            max-height: 350px;
            padding-inline: 10px;
            padding-bottom: 10px;
            margin-top: 120px;
            border-radius: 15px;
            border: 0px solid rgba(255, 255, 255, 0);
            color: whitesmoke;
            display: flex;
            flex-direction: column;
            gap: 10px;
            background: 
            linear-gradient(black) padding-box ,
            conic-gradient(from var(--rotate) ,black , rgb(255,0, 123) , black) border-box;
            animation: borderanimate 5s infinite;
            animation-iteration-count: infinite;
            animation-timing-function: linear;
            animation-play-state: paused;
            transition: all 0.3s ease-in;
            box-shadow: 0 0 0px rgb(255,0, 195);
            color: white;
            text-shadow: 0 0 0px rgb(255,0, 123);
        }

        .box:hover {
            animation-play-state: running;
            border-width: 6px;
            box-shadow: 0 0 60px rgb(255,0, 123);
            color: rgb(255,0, 123);
            text-shadow: 0 0 10px rgb(255,0, 123);

        }

        .box img {
            width: 100%;
            height: 70%;        
        }

        h2 {
            margin: 5px;
        }

    </style>
</head>
<body>
    <div class="box">
        <img src="https://i.pinimg.com/736x/14/09/f4/1409f485222d05ad7f715538c6ed2f54.jpg" alt="">
        <h2>krishna</h2>
        Lorem ipsum dolor, sit amet consectetur adipisicing elit. 
    </div>
</body>
</html>
