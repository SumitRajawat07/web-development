<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html ,body {
            height: 100%;
            width: 100%;
        }

        body {
            display: flex;
            align-items: center;
            justify-content: center;
            background-color: rgb(44, 42, 42);
        }
        
        @keyframes bgc {
            from {
                background-color:rgb(240, 233, 233);
                border-radius: 0px;
                transform: translate(0px) scale(1);
            }

            to {
                background-color:rgb(206, 0, 0);
                border-radius: 50px;
                transform: translate(100px) scale(0.5);
            }
        }

        .box {
            height: 200px;
            width: 400px;
            animation: bgc 3s infinite forwards alternate;
        }
            
            
    </style>
</head>
<body>
    <div class="box"></div>
</body>
</html>
