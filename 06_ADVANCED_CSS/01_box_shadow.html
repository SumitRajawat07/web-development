<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html,body {
            height: 100%;
            width: 100%;
        }

        body {
            display:flex;
            align-items: center;
            justify-content:center;
            background-color:rgb(0, 0, 0);
        }
        .box {
            height: 200px;
            width: 400px;
            border-radius: 5px;
            background-color: rgb(169, 27, 27);
            box-shadow: 0px 0px 400px rgb(9, 197, 9);
        }

    </style>
</head>
<body>
    <div class="box"></div>
</body>
</html>
