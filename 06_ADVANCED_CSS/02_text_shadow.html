<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
         
        html , body {
            height: 100%;
            width: 100%;
        } 

        body {
            display: flex;
            align-items: center;
            justify-content: center;
            background-color: black;
        }

        .box {
            height: 200px;
            width: 400px;
            background-color: white;
            box-shadow: 0px 0px 400px rgb(232, 14, 14);
        }

        .box>h2{
            text-shadow: 2px 2px 10px rgb(255, 1, 1);

        }
    </style>
</head>
<body>
    <div class="box">
        <h2>Sumit Rajawat</h2>
    </div>
</body>
</html>
