<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        * {
            height: 100%;
            width: 100%;
            box-sizing: border-box;
        }
        html,body {
            height: 100%;
            width: 100%;
            background-color: black;
        }
        body {
            background-image:url(https://i.pinimg.com/736x/a1/28/11/a1281126a73696c221bb170184533d84.jpg);
            background-size: cover;
        }
        :root {
            --x : 400px;
            --y : 400px;
        }
        .box {
            height: 100%;
            width: 100%;
            background: radial-gradient(200px at var(--x) var(--y), rgba(239, 239, 255, 0) , rgba(11, 0, 0, 0.964));
        }
    </style>
</head>
<body>
    <div class="box"></div>
    <script src="image.js"></script>
</body>
</html>
