<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        *{
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        #main {
            padding: 30px;
            width: 100%;
            height: 100%;
            background-color: #222;
        }
        .card{
            max-width: 300px;
            color: aliceblue;
            margin-top: 40px;
            border-radius: 10px;
            display: inline-block;
            padding: 30px;
            height: 100%;
            border: 1px solid #555;
        }
        .profile {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            overflow: hidden;
        }
        .profile img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .card h5 {
            margin-top: 30px;
        }
        .card p {
            font-size: 12px;
            margin-top: 10px;
        }
        
    </style>
</head>
<body>
    
    <div id="main">
        <form action="">
         <input type="text" placeholder = "profile pic">
         <input type="text"placeholder = "name">
         <input type="text"placeholder = "occupation">
         <input type="text"placeholder = "info">
         <input type="submit">
        </form>
    </div>

    </div>
    <script src="card.js"></script>
</body>
</html>
