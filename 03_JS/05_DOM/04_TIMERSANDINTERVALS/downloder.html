<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html ,body {
            height: 100%;
            width: 100%;
        }

        main {
            height: 100%;
            width: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            background-color: black;
        }
        .card {
            width: 600px;
            border-radius: 10px;
            padding: 20px;
            background-color: white;
        }
        .outer {
            height: 25px;
            width: 100%;
            border-radius: 8px;
            background-color:rgb(197, 191, 191);
        }
        .inner {
            height: 100%;
            background-color: aqua;
            border-radius: 5px;
        }
        .bottom {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-top: 20px;
        }
        .bottom h2 {
            font-size: 60px;
        }
        .bottom button {
            padding: 12px 25px;
            background-color: green;
            color: white;
            border-radius: 10px;
            border: 0;
            font-size: 18px;
            cursor: pointer;
        }
        .bottom button:active {
            scale: 0.9;
        }
    </style>
</head>
<body>
    <main>
        <div class="card">
            <div class="outer">
                <div class="inner">

                </div>
            </div>

            <div class="bottom">
                <h2>0%</h2>
                <button>Download</button>
            </div>
        </div>
    </main>
    <script src="downloader.js"></script>
</body>
</html>
